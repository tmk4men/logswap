<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f4f1"/>
      <stop offset="1" stop-color="#eceae4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- brand mark -->
  <g transform="translate(96,96)">
    <rect width="64" height="64" rx="16" fill="#1b1a17"/>
    <g fill="none" stroke="#fb4a3e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(13,13) scale(1.2)">
      <path d="M5 9h13l-3.6-3.6"/>
      <path d="M27 23H14l3.6 3.6"/>
    </g>
    <text x="84" y="44" font-family="'Space Grotesk',Arial,sans-serif" font-size="34" font-weight="700" fill="#1b1a17">LogSwap</text>
  </g>

  <!-- headline -->
  <text x="96" y="320" font-family="'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="900" fill="#1b1a17" letter-spacing="-2">その日のログを、</text>
  <text x="96" y="430" font-family="'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="900" fill="#fb4a3e" letter-spacing="-2">交換しよう。</text>

  <!-- sub -->
  <text x="100" y="510" font-family="'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif" font-size="30" font-weight="500" fill="#46443e">スワイプで、その日のミニVlogを見せ合えるログ交換アプリ</text>

  <!-- footer chip -->
  <g transform="translate(96,548)">
    <rect width="430" height="44" rx="22" fill="#1b1a17"/>
    <text x="26" y="29" font-family="'Zen Kaku Gothic New',sans-serif" font-size="20" font-weight="700" fill="#f5f4f1">マッチングアプリではありません</text>
  </g>
</svg>
