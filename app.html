<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f4f1" />
  <title>LogSwap｜スワイプ</title>
  <meta name="description" content="セットログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tmk4men.github.io/logswap/app.html" />

  <!-- OGP -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="LogSwap" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:url" content="https://tmk4men.github.io/logswap/app.html" />
  <meta property="og:title" content="LogSwap｜スワイプしてログを交換" />
  <meta property="og:description" content="セットログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta property="og:image" content="https://tmk4men.github.io/logswap/assets/og.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="LogSwap セットログを交換しよう" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LogSwap｜スワイプしてログを交換" />
  <meta name="twitter:description" content="セットログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta name="twitter:image" content="https://tmk4men.github.io/logswap/assets/og.png" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-page">
  <div class="app-shell">
    <!-- App bar -->
    <header class="app-bar">
      <a class="app-back" href="index.html" aria-label="紹介ページへ戻る">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><path d="M15 6l-6 6 6 6"/></svg>
      </a>
      <a class="brand" href="index.html" aria-label="LogSwap ホーム">
        <svg class="brand-glyph" viewBox="0 0 24 24" aria-hidden="true" width="20" height="20"><path d="M7 7h9l-2.5-2.5M17 17H8l2.5 2.5"/></svg>
        <span class="brand-word">LogSwap</span>
      </a>
      <button class="chip-btn dark" id="matchesBtn" type="button" aria-label="交換成立したログ">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="ico-line"><path d="M7 7h9l-2.5-2.5M17 17H8l2.5 2.5"/></svg>
        <span class="chip-count" id="matchCount" hidden>0</span>
      </button>
    </header>

    <!-- Card stage -->
    <main class="app-stage">
      <div class="stage">
        <div class="deck" id="deck" aria-live="polite"></div>

        <div class="coach" id="coach" hidden>
          <div class="coach-side coach-l">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><path d="M6 6l12 12M18 6L6 18"/></svg>
            見送る
          </div>
          <div class="coach-side coach-r">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><circle cx="12" cy="12" r="7"/></svg>
            交換したい
          </div>
        </div>

        <div class="empty" id="empty" hidden>
          <p class="empty-title">今日のログは一巡しました</p>
          <p class="empty-sub">新しいログが届くまでお待ちください。</p>
          <button class="btn-primary sm" id="resetBtn" type="button">もう一度見る</button>
        </div>
      </div>
    </main>

    <!-- Controls -->
    <div class="controls app-controls" id="controls">
      <div class="ctrl-cell">
        <button class="ctrl ctrl-no" id="noBtn" type="button" aria-label="見送る">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" class="ico-line"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <span class="ctrl-cap dark">見送る</span>
      </div>
      <div class="ctrl-cell">
        <button class="ctrl ctrl-info" id="infoBtn" type="button" aria-label="ログを詳しく見る">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><path d="M12 16v-5"/><path d="M12 8h.01"/><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <span class="ctrl-cap dark">詳しく</span>
      </div>
      <div class="ctrl-cell">
        <button class="ctrl ctrl-yes" id="yesBtn" type="button" aria-label="交換したい">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" class="ico-line"><circle cx="12" cy="12" r="8"/></svg>
        </button>
        <span class="ctrl-cap dark">交換したい</span>
      </div>
    </div>
    <p class="demo-hint dark">ドラッグでスワイプ／PCは ← → キーでも操作できます</p>
  </div>

  <!-- Match overlay -->
  <div class="overlay" id="matchOverlay" hidden>
    <div class="confetti" id="confetti" aria-hidden="true"></div>
    <div class="dialog match-dialog" role="dialog" aria-modal="true" aria-labelledby="matchTitle">
      <p class="match-kicker">交換成立</p>
      <h2 class="match-title" id="matchTitle">ログを交換しました</h2>
      <p class="match-sub" id="matchSub"></p>
      <div class="match-logs" id="matchLogs"></div>
      <div class="dialog-actions">
        <button class="btn-primary" id="viewLogBtn" type="button">交換したログを見る</button>
        <button class="btn-ghost" id="keepSwiping" type="button">スワイプを続ける</button>
      </div>
    </div>
  </div>

  <!-- Matches sheet -->
  <div class="overlay sheet-overlay" id="matchesSheet" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-head">
        <h2 id="sheetTitle">交換成立したログ</h2>
        <button class="chip-btn" id="closeSheet" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="ico-line"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="sheet-list" id="matchesList"></div>
    </div>
  </div>

  <!-- Log viewer -->
  <div class="overlay" id="logViewer" hidden>
    <div class="dialog viewer" role="dialog" aria-modal="true" aria-labelledby="viewerName">
      <div class="viewer-head" id="viewerHead"></div>
      <div class="viewer-timeline" id="viewerTimeline"></div>
      <button class="btn-primary" id="closeViewer" type="button">閉じる</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
