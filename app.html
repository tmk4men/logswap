<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f2effb" />
  <title>LogSwap｜スワイプ</title>
  <meta name="description" content="ログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tmk4men.github.io/logswap/app.html" />

  <!-- OGP -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="LogSwap" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:url" content="https://tmk4men.github.io/logswap/app.html" />
  <meta property="og:title" content="LogSwap｜スワイプしてログを交換" />
  <meta property="og:description" content="ログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta property="og:image" content="https://tmk4men.github.io/logswap/assets/og.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="LogSwap ログを交換しよう" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LogSwap｜スワイプしてログを交換" />
  <meta name="twitter:description" content="ログを交換する相手を探す。スワイプして、おたがいOKでログを見せ合おう。" />
  <meta name="twitter:image" content="https://tmk4men.github.io/logswap/assets/og.png" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260629" />
</head>
<body class="app-page">
  <div class="app-shell">
    <!-- App bar -->
    <header class="app-bar">
      <a class="app-back" href="index.html" aria-label="紹介ページへ戻る">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><path d="M15 6l-6 6 6 6"/></svg>
      </a>
      <a class="brand" href="index.html" aria-label="LogSwap ホーム">
        <svg class="brand-glyph" viewBox="0 0 24 24" aria-hidden="true" width="20" height="20"><path d="M7 7h9l-2.5-2.5M17 17H8l2.5 2.5"/></svg>
        <span class="brand-word">LogSwap</span>
      </a>
      <span class="app-bar-spacer" aria-hidden="true"></span>
    </header>

    <!-- Card stage -->
    <main class="app-stage">
      <div class="stage">
        <div class="deck" id="deck" aria-live="polite"></div>

        <div class="empty" id="empty" hidden>
          <p class="empty-title">今日のログは一巡しました</p>
          <p class="empty-sub">新しいログが届くまでお待ちください。</p>
          <button class="btn-primary sm" id="resetBtn" type="button">もう一度見る</button>
        </div>
      </div>

      <!-- 初回プロフィール入力（保存後はスキップ） -->
      <form class="profile-setup" id="profileSetup" novalidate hidden>
        <div class="ps-head">
          <h2>プロフィールを作成</h2>
          <p class="ps-sub">交換相手に表示される情報です。あとから変更できます。</p>
        </div>

        <div class="pf-field">
          <label for="pf-name">名前</label>
          <input class="pf-input" id="pf-name" type="text" maxlength="20" autocomplete="name" required />
          <p class="pf-err" id="pf-name-err" role="alert" hidden>名前を入力してください。</p>
        </div>

        <div class="pf-field">
          <label for="pf-pref">住んでいる地域（都道府県）</label>
          <select class="pf-input" id="pf-pref">
            <option value="">選択してください</option>
            <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option><option>秋田県</option><option>山形県</option><option>福島県</option>
            <option>茨城県</option><option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option><option>東京都</option><option>神奈川県</option>
            <option>新潟県</option><option>富山県</option><option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
            <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
            <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option><option>奈良県</option><option>和歌山県</option>
            <option>鳥取県</option><option>島根県</option><option>岡山県</option><option>広島県</option><option>山口県</option>
            <option>徳島県</option><option>香川県</option><option>愛媛県</option><option>高知県</option>
            <option>福岡県</option><option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option><option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option>
          </select>
        </div>

        <div class="pf-field">
          <label for="pf-gender">性別</label>
          <select class="pf-input" id="pf-gender">
            <option value="">選択してください</option>
            <option value="female">女性</option>
            <option value="male">男性</option>
            <option value="other">その他</option>
            <option value="na">回答しない</option>
          </select>
          <p class="pf-hint">他の人には表示されません。</p>
        </div>

        <div class="pf-field">
          <label for="pf-image">プロフィール画像（1枚）</label>
          <input class="pf-file" id="pf-image" type="file" accept="image/*" />
          <div class="pf-preview pf-preview-img" id="pf-image-preview" hidden></div>
        </div>

        <div class="pf-field">
          <label for="pf-video">ログの動画（1つだけ）</label>
          <input class="pf-file" id="pf-video" type="file" accept="video/*" />
          <div class="pf-preview" id="pf-video-preview" hidden></div>
          <p class="pf-hint">投稿できる動画は1人につき1つまでです。</p>
        </div>

        <button class="btn-primary" id="pfStart" type="submit">はじめる</button>
      </form>
    </main>

    <!-- Controls（アイコンのみ。説明は置かない） -->
    <div class="controls app-controls" id="controls">
      <button class="ctrl ctrl-no" id="noBtn" type="button" aria-label="見送る">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" class="ico-line"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="ctrl ctrl-info" id="infoBtn" type="button" aria-label="ログを詳しく見る">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="ico-line"><path d="M12 16v-5"/><path d="M12 8h.01"/><circle cx="12" cy="12" r="9"/></svg>
      </button>
      <button class="ctrl ctrl-yes" id="yesBtn" type="button" aria-label="交換したい">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" class="ico-line"><circle cx="12" cy="12" r="8"/></svg>
      </button>
    </div>
  </div>

  <!-- Match overlay -->
  <div class="overlay" id="matchOverlay" hidden>
    <div class="confetti" id="confetti" aria-hidden="true"></div>
    <div class="dialog match-dialog" role="dialog" aria-modal="true" aria-labelledby="matchTitle">
      <p class="match-kicker">交換成立</p>
      <h2 class="match-title" id="matchTitle">ログを交換しました</h2>
      <p class="match-sub" id="matchSub"></p>
      <div class="match-logs" id="matchLogs"></div>
      <div class="dialog-actions">
        <button class="btn-primary" id="keepSwiping" type="button">スワイプを続ける</button>
      </div>
    </div>
  </div>

  <!-- Log viewer -->
  <div class="overlay" id="logViewer" hidden>
    <div class="dialog viewer" role="dialog" aria-modal="true" aria-labelledby="viewerName">
      <div class="viewer-head" id="viewerHead"></div>
      <div class="viewer-timeline" id="viewerTimeline"></div>
      <button class="btn-primary" id="closeViewer" type="button">閉じる</button>
    </div>
  </div>

  <script src="js/data.js?v=20260629"></script>
  <script src="js/app.js?v=20260629"></script>
</body>
</html>
